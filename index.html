<!DOCTYPE html>
<html>
<head>
<title>DPS KP-V</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html {
  scroll-behavior: smooth;
}

body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  transition:0.3s;
}

/* NAVBAR */
nav {
  background:#1e293b;
  padding:15px;
  position:sticky;
  top:0;
}
nav a {
  color:white;
  margin:15px;
  text-decoration:none;
  font-weight:bold;
}
button {
  float:right;
  background:#3b82f6;
  border:none;
  padding:8px 12px;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

/* HERO */
.hero {
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(to right,#1e3a8a,#9333ea);
}
.hero h1 {
  font-size:50px;
}
.hero p {
  font-size:20px;
}

/* BUTTON */
.btn {
  margin-top:20px;
  padding:12px 25px;
  background:#3b82f6;
  border-radius:5px;
  text-decoration:none;
  color:white;
}

/* SECTIONS */
section {
  padding:50px;
  text-align:center;
}

/* CARDS */
.card {
  background:#1e293b;
  margin:15px;
  padding:20px;
  border-radius:10px;
  display:inline-block;
  width:250px;
  transition:0.3s;
}
.card:hover {
  transform:scale(1.1);
}

/* GALLERY */
.img {
  width:250px;
  margin:10px;
  border-radius:10px;
  transition:0.3s;
}
.img:hover {
  transform:scale(1.1);
}

/* LIGHT MODE */
.light {
  background:white;
  color:black;
}
.light nav {
  background:#ddd;
}
.light .card {
  background:#eee;
}

/* FOOTER */
footer {
  background:#1e293b;
  padding:20px;
  text-align:center;
}
</style>
</head>

<body>

<nav>
  <button onclick="toggleMode()">🌙</button>
  <a href="#home">Home</a>
  <a href="#about">About</a>
  <a href="#facilities">Facilities</a>
  <a href="#gallery">Gallery</a>
</nav>

<div class="hero" id="home">
  <h1>DPS Knowledge Park V</h1>
  <p id="typing"></p>
  <a href="#about" class="btn">Explore</a>
</div>

<section id="about">
  <h2>About School</h2>
  <p>DPS KP-V is a leading CBSE school focused on academic excellence and overall development.</p>
</section>

<section id="facilities">
  <h2>Facilities</h2>

  <div class="card">Smart Classrooms</div>
  <div class="card">Science Labs</div>
  <div class="card">Sports Complex</div>

</section>

<section id="gallery">
  <h2>Gallery</h2>

  <img src="https://picsum.photos/300?1" class="img">
  <img src="https://picsum.photos/300?2" class="img">
  <img src="https://picsum.photos/300?3" class="img">

</section>

<footer>
  <p>© DPS KP-V Website Project</p>
</footer>

<script>
function toggleMode() {
  document.body.classList.toggle("light");
}

/* TYPING EFFECT */
let text = "Shaping Future Leaders...";
let i = 0;

function type() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 50);
  }
}
type();
</script>

</body>
</html>
